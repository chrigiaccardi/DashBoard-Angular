<section>
<h1>Lista Invitati</h1>

<button matButton="tonal" (click)="apriDialog()"> 
    <mat-icon>add</mat-icon>
    Aggiungi Invitato 
</button>
<table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

    <!-- Nome -->
    <ng-container matColumnDef="nome">
        <th mat-header-cell *matHeaderCellDef> Nome </th>
        <td mat-cell *matCellDef="let persona"> {{persona.nome}} </td>
    </ng-container>

    <!-- Cognome -->
    <ng-container matColumnDef="cognome">
        <th mat-header-cell *matHeaderCellDef> Cognome </th>
        <td mat-cell *matCellDef="let persona"> {{persona.cognome}} </td>
    </ng-container>

    <ng-container matColumnDef="elimina">
        <th mat-header-cell *matHeaderCellDef> Elimina </th>
        <td mat-cell *matCellDef="let persona"> 
        <button mat-icon-button (click)="deletePersona(persona.id)">
            <mat-icon>delete</mat-icon>
        </button>    
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
</table>
</section>
