<h1>Registrazione Utente</h1>

<form #registrazioneForm="ngForm" (click)="onSubmit(registrazioneForm)">
    <mat-form-field>
        <mat-label>Input</mat-label>
        <input matInput name="email" type="email" autocomplete="username" ngModel required>
    </mat-form-field>
    <mat-form-field>
        <mat-label>Input</mat-label>
        <input matInput name="password" type="password" autocomplete="new-password" required>
    </mat-form-field>
    <button matButton="tonal" type="submit" [disabled]="!registrazioneForm.valid">Basic</button>
</form>
