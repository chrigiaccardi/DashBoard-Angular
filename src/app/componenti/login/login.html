<h1>Login Utente</h1>

<form #loginForm="ngForm" (click)="onSubmit(loginForm)">
    <mat-form-field>
        <mat-label>Input</mat-label>
        <input matInput name="email" type="email" autocomplete="username" ngModel required>
    </mat-form-field>
    <mat-form-field>
        <mat-label>Input</mat-label>
        <input matInput name="password" type="password" autocomplete="current-password" required>
    </mat-form-field>
    <button matButton="tonal" type="submit" [disabled]="!loginForm.valid">Basic</button>
</form>
