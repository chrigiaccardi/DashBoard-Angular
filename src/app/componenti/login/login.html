<section>
    <h1>Login Utente</h1>

<form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">
    <mat-form-field>
        <mat-label>Email</mat-label>
        <input matInput name="email" type="email" autocomplete="username" ngModel required>
    </mat-form-field>
    <mat-form-field>
        <mat-label>Password</mat-label>
        <input matInput name="password" type="password" autocomplete="current-password" ngModel required>
    </mat-form-field>
    <button matButton="tonal" type="submit" [disabled]="!loginForm.valid">Basic</button>
</form>
</section>
