<mat-toolbar>
    <button matIconButton class="example-icon" aria-label="Example icon-button with menu icon" (click)="toggleDrawer()">
        <mat-icon>menu</mat-icon>
    </button>
    <span>Rita & Christian ✨</span>
    <span class="example-spacer"></span>
    <button matIconButton class="example-icon favorite-icon" aria-label="Example icon-button with heart icon" routerLink="registrazione">
        <mat-icon>app_registration</mat-icon>
    </button>
    <button matIconButton class="example-icon favorite-icon" aria-label="Example icon-button with heart icon" routerLink="login">
        <mat-icon>login</mat-icon>
    </button>
    <button matIconButton class="example-icon" aria-label="Example icon-button with share icon" (click)="logout()">
        <mat-icon>logout</mat-icon>
    </button>
</mat-toolbar>

<mat-drawer-container class="example-container">
    <mat-drawer #drawer mode="side">
        <mat-list role="list">
            <mat-list-item role="listitem" routerLink="pagina1" [routerLinkActive]="'attivo'">Pagina 1</mat-list-item>
            <mat-list-item role="listitem" routerLink="pagina2" [routerLinkActive]="'attivo'">Pagina 2</mat-list-item>
            <mat-list-item role="listitem" routerLink="pagina3" [routerLinkActive]="'attivo'">Pagina 3</mat-list-item>
        </mat-list>
    </mat-drawer>
    <mat-drawer-content>
        <router-outlet> </router-outlet>
    </mat-drawer-content>
</mat-drawer-container>
